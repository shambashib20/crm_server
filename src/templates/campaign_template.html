<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exciting Offer Just for You!</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }

      .container {
        background-color: #ffffff;
        margin: 20px auto;
        padding: 20px;
        width: 90%;
        max-width: 600px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .header {
        background-color: #4caf50;
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 10px 10px 0 0;
      }

      .content {
        padding: 20px;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: #888;
        margin-top: 20px;
      }

      .btn {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Special Offer Inside 🎉</h1>
      </div>
      <div class="content">
        <p>Hi {{name}},</p>
        <p>We’re excited to offer you an exclusive discount on our services! This offer is only available for a limited time.</p>

        <p><strong>Don't miss out on this opportunity!</strong></p>

        <a href="https://yourapp.com/offer" class="btn">Claim Your Offer</a>
      </div>
      <div class="footer">
        © 2025 Your Company. All rights reserved.
      </div>
    </div>
  </body>
</html>
